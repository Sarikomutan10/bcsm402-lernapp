<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#102a2c">
  <meta name="description" content="Offline-Lernapp für BCSM 402 Business Continuity Management">
  <title>BCM Basecamp · BCSM 402</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Hauptnavigation">
      <button class="brand" data-route="dashboard" aria-label="Zur Übersicht">
        <span class="brand-mark">B</span>
        <span><strong>BCM Basecamp</strong><small>BCSM 402 · SoSe 2026</small></span>
      </button>

      <nav class="main-nav">
        <button data-route="dashboard" class="nav-item active"><span>⌂</span>Übersicht</button>
        <button data-route="focus" class="nav-item"><span>⚡</span>Prüfungsfokus</button>
        <button data-route="learn" class="nav-item"><span>◫</span>Lernpfad</button>
        <button data-route="cards" class="nav-item"><span>◈</span>Karteikarten</button>
        <button data-route="quiz" class="nav-item"><span>✓</span>Quiz & Prüfung</button>
        <button data-route="exercises" class="nav-item"><span>✎</span>NGA-Übungen</button>
        <button data-route="case" class="nav-item"><span>⌘</span>Fallstudie NGA</button>
        <button data-route="glossary" class="nav-item"><span>≡</span>Glossar</button>
        <button data-route="source" class="nav-item"><span>↗</span>Originalunterlagen</button>
        <button data-route="manage" class="nav-item"><span>＋</span>Inhalte hinzufügen</button>
      </nav>

      <div class="sidebar-foot">
        <div class="streak-pill"><span>🔥</span><div><strong id="streak-count">0 Tage</strong><small>Lernserie</small></div></div>
        <button class="text-button" id="export-progress">Fortschritt sichern</button>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="page-eyebrow">DEIN LERNCOCKPIT</p>
          <h1 id="page-title">Heute zählt der nächste Schritt.</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="theme-toggle" aria-label="Darstellung wechseln">◐</button>
          <button class="avatar" aria-label="Profil">A</button>
        </div>
      </header>

      <section id="view" class="view" aria-live="polite"></section>
    </main>
  </div>

  <nav class="mobile-nav" aria-label="Mobile Navigation">
    <button data-route="dashboard" class="active"><span>⌂</span>Start</button>
    <button data-route="focus"><span>⚡</span>Fokus</button>
    <button data-route="learn"><span>◫</span>Lernen</button>
    <button data-route="quiz"><span>✓</span>Quiz</button>
    <button data-route="exercises"><span>✎</span>Übungen</button>
  </nav>

  <div id="toast" class="toast" role="status"></div>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
